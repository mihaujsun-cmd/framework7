<div class="page" data-name="taches">

  <!-- Barre de navigation (haut) -->
  <div class="navbar">
    <div class="navbar-bg"></div>
    <div class="navbar-inner">
      <div class="title">Ma ToDo</div>
    </div>
  </div>

  <!-- Barre d'onglets -->
  <div class="toolbar tabbar toolbar-bottom">
    <div class="toolbar-inner">
      <a href="/" class="tab-link custom-tab">
        <span class="text-color-white">Accueil</span>
      </a>
      <a href="/taches/" class="tab-link tab-link-active custom-tab">
        <span>Taches</span>
      </a>
    </div>
  </div>

  <div class="page-content">

    <!-- Champ + bouton ajouter -->
    <div class="list inset">
      <ul>
        <li class="item-content item-input">
          <div class="item-inner">
            <div class="item-input-wrap">
              <input
                type="text"
                id="champ-tache"
                placeholder="Nouvelle tâche..."
              />
            </div>
          </div>
        </li>
      </ul>
    </div>

    <div class="block">
      <a href="#" class="button button-fill" id="btn-ajouter">Ajouter</a>
    </div>

    <!-- Compteur -->
    <div class="block">
      <p class="compteur">0 tâche(s) restante(s)</p>
    </div>

    <!-- Filtres -->
    <div class="block">
      <div class="segmented segmented-raised">
        <a href="#" class="button filtre-btn button-active" data-filtre="toutes">Toutes</a>
        <a href="#" class="button filtre-btn" data-filtre="afaire">À faire</a>
        <a href="#" class="button filtre-btn" data-filtre="faites">Faites</a>
      </div>
    </div>

    <!-- Liste des tâches -->
    <div class="list">
      <ul class="liste-taches">
        <!-- Affichée dynamiquement par app.js -->
      </ul>
    </div>

  </div>

</div>
